<casa-auth-flow-page [content]="content">
  <form class="auth-form" (submit)="register($event)">
    <label class="auth-field">
      <span>E-posta</span>
      <input type="email" [value]="email()" (input)="updateEmail($event)" autocomplete="email" />
    </label>

    <label class="auth-field">
      <span>Sifre</span>
      <input
        type="password"
        [value]="password()"
        (input)="updatePassword($event)"
        autocomplete="new-password"
      />
    </label>

    <label class="auth-field">
      <span>Sifre tekrar</span>
      <input
        type="password"
        [value]="confirmPassword()"
        (input)="updateConfirmPassword($event)"
        autocomplete="new-password"
      />
    </label>

    <p *ngIf="errorMessage()" class="auth-error">{{ errorMessage() }}</p>

    <div class="auth-form-actions">
      <button type="submit" [disabled]="isBusy()">
        {{ isBusy() ? 'Kayit olusturuluyor...' : 'Kayit olustur' }}
      </button>
      <a routerLink="/auth/login">Mevcut hesapla giris yap</a>
    </div>
  </form>
</casa-auth-flow-page>
